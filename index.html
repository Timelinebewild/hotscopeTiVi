<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ＨｏｔＳｃｏｐｅ ＴＶ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0b0f1a;
  font-family:Arial,Helvetica,sans-serif;
  color:#fff;
}

.page{
  max-width:480px;
  margin:auto;
  min-height:100vh;
}

.title{
  font-size:20px;
  font-weight:700;
  padding:16px 14px 6px;
  line-height:1.4;
}

.desc{
  color:#94a3b8;
  font-size:13px;
  padding:0 14px 14px;
}

.video-wrap{
  position:relative;
  background:#000;
  overflow:hidden;
}

/* loading */
.loading{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:13px;
  color:#cbd5e1;
}

/* video */
video{
  width:100%;
  max-height:75vh;
  display:block;
  background:#000;
}

/* tombol play */
.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#ff2d55;
  color:#fff;
  border:none;
  padding:13px 20px;
  font-size:15px;
  border-radius:8px;
  cursor:pointer;
  z-index:2;
}

/* info */
.info{
  padding:14px;
  font-size:13px;
  color:#cbd5e1;
}

/* badge */
.badge{
  display:inline-block;
  background:#172033;
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  margin:0 14px 14px;
}

/* native */
.native-box{
  margin:10px 14px;
}

/* footer */
.footer{
  text-align:center;
  font-size:11px;
  color:#64748b;
  padding:20px 10px;
}
</style>
</head>

<body>

<div class="page">

<div class="title">
Interesting Moment Caught On Camera
</div>

<div class="desc">
Watch the full clip below and see what really happened.
</div>

<div class="video-wrap">

<div class="loading" id="loading">Loading video...</div>

<button class="play-btn" id="playBtn">▶ Tap To Watch</button>

<video id="player" muted playsinline preload="metadata">
<source id="videoSource" src="" type="video/mp4">
</video>

</div>

<div class="info">
Tap to start the video if it doesn't play automatically.
</div>

<div class="badge">
🔥 Trending Now
</div>

<!-- NATIVE ADS -->
<div class="native-box">
<script async src="https://brewdismaychest.com/e683f08bb48dce3b56a2a341bc2a4152/invoke.js"></script>
<div id="container-e683f08bb48dce3b56a2a341bc2a4152"></div>
</div>

<div class="footer">
© Spicy Vibes TV
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let video = params.get("v");

// default video
if(!video){
  video = "https://cdn.videy.co/AAU8a62J1.mp4";
}

// normalize link
if(!video.startsWith("http")){
  video = "https://cdn.videy.co/" + video;
}

const player = document.getElementById("player");
const source = document.getElementById("videoSource");
const playBtn = document.getElementById("playBtn");
const loading = document.getElementById("loading");

source.src = video;
player.load();

// sembunyiin loading saat ready
player.addEventListener("loadeddata", () => {
  loading.style.display = "none";
});

// autoplay attempt (soft)
player.play().catch(()=>{});

// trigger sekali
let triggered = false;

playBtn.addEventListener("click", () => {
  player.muted = false;
  player.play();
  playBtn.style.display = "none";

  // popunder aman (user action)
  if(!triggered){
    triggered = true;
    window.open("https://brewdismaychest.com/2c/e6/f8/2ce6f8591c212a9ace00e29d2b62f259.js", "_blank");
  }
});
</script>

</body>
</html>
