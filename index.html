<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HotScope TV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0b0f1a;
  font-family:Arial,Helvetica,sans-serif;
  color:#fff;
}

.page{
  max-width:480px;
  margin:auto;
  min-height:100vh;
}

.title{
  font-size:20px;
  font-weight:700;
  padding:16px 14px 6px;
}

.desc{
  color:#94a3b8;
  font-size:13px;
  padding:0 14px 14px;
}

.video-wrap{
  position:relative;
  background:#000;
}

video{
  width:100%;
  max-height:75vh;
  display:block;
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#ff2d55;
  color:#fff;
  border:none;
  padding:13px 20px;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}

.info{
  padding:14px;
  font-size:13px;
  color:#cbd5e1;
}

.native-box{
  margin:10px 14px;
}

.footer{
  text-align:center;
  font-size:11px;
  color:#64748b;
  padding:20px 10px;
}
</style>
</head>

<body>

<div class="page">

<div class="title">
Interesting Moment Caught On Camera
</div>

<div class="desc">
Watch the full clip below.
</div>

<div class="video-wrap">

<button class="play-btn" id="playBtn">▶ Tap To Watch</button>

<video id="player" muted playsinline preload="metadata">
<source src="https://cdn.videy.co/AAU8a62J1.mp4" type="video/mp4">
</video>

</div>

<div class="info">
Tap to start the video.
</div>

<!-- ✅ NATIVE ADS -->
<div class="native-box">
<script async="async" data-cfasync="false" src="https://brewdismaychest.com/e683f08bb48dce3b56a2a341bc2a4152/invoke.js"></script>
<div id="container-e683f08bb48dce3b56a2a341bc2a4152"></div>
</div>

<div class="footer">
© HotScope TV
</div>

</div>

<script>
const player = document.getElementById("player");
const playBtn = document.getElementById("playBtn");

let triggered = false;

playBtn.addEventListener("click", () => {

  // play video
  player.muted = false;
  player.play();
  playBtn.style.display = "none";

  // 🔥 POPUNDER (AMAN - SETELAH KLIK)
  if(!triggered){
    triggered = true;

    var s = document.createElement("script");
    s.src = "https://brewdismaychest.com/2c/e6/f8/2ce6f8591c212a9ace00e29d2b62f259.js";
    document.body.appendChild(s);
  }

});
</script>

</body>
</html>
